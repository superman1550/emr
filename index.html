    function createDoc(modal = '9') {
      const editframe1 = document.getElementById("edit-frame1");
      editframe1.contentWindow.EditorWebs.create(
        Object.assign({}, config, {

    function loadInit(modal, file) {
      const editframe1 = document.getElementById("edit-frame1");
      var source = {
        yljg: "XXX县人民医院",
        zzjgbm: "1111111111111111111111111111",
        ylfffs: "自费支付",
        jkkh: "A10000001",

            code: "1",
            text: "选项一",
          },
          {

            text: "选项二",
          },
        ],
      };
      fetch(file).then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.text();
      }).then((filedata) => {
        const data =
          editframe1.contentWindow.EditorVersion.conver(filedata);
        editframe1.contentWindow.EditorWebs.loadTemplet(
          Object.assign({}, config, {
            modal: modal
          }),
          data,
          source
        );
      }).catch((error) => {
        console.error("请求失败：", error);
      });
    }

    function loadDoc(modal, file) {
      const editframe1 = document.getElementById("edit-frame1");
      fetch(file).then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.text();
      }).then((filedata) => {
        const data =
          editframe1.contentWindow.EditorVersion.conver(filedata);
        editframe1.contentWindow.EditorWebs.load(
          Object.assign({}, config, {
            modal: modal
          }),
          data
        );
      }).catch((error) => {
        console.error("请求失败：", error);
      });
    }

    function loadImage(url, callback) {
      fetch(url).then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.blob();
      }).then((filedata) => {
        const reader = new FileReader();
        // 读取完成后触发 onload 事件
        reader.onloadend = () => {
          // result 就是 Base64 字符串（格式：data:image/png;base64,xxxx...）
          callback(reader.result);
        };
        // 以 DataURL 格式读取 Blob（自动转为 Base64）
        reader.readAsDataURL(filedata);
      }).catch((error) => {
        console.error("请求失败：", error);
      });
    }
